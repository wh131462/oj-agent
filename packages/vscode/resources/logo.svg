  <circle cx="44" cy="68" r="20" stroke="#ffffff" stroke-width="7" fill="none"/>
  <!-- J: 竖钩 -->
  <path d="M78 42 L78 72 Q78 90 62 90" stroke="#ffffff" stroke-width="7" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <!-- Agent 状态指示点 -->
