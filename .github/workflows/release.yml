name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  package-vsix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build all packages
        run: pnpm -r build

      - name: Package VSIX
        run: node scripts/vsce-package.mjs

      - name: Locate VSIX
        id: vsix
        run: |
          file=$(ls packages/vscode/*.vsix | head -n1)
          if [ -z "$file" ]; then
            echo "No .vsix produced under packages/vscode/" >&2
            exit 1
          fi
          echo "path=$file" >> "$GITHUB_OUTPUT"
          echo "name=$(basename "$file")" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release with VSIX
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          generate_release_notes: true
          files: ${{ steps.vsix.outputs.path }}
